; Adafruit Metro ESP32-S3 (PID 5500) room-climate display
; See CLAUDE.md for the full design. Library versions are PINNED on purpose —
; do not float LVGL on ^, a minor bump can break lv_conf.h.

[env:adafruit_metro_esp32s3]
platform = espressif32
board = adafruit_metro_esp32s3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; --- 16MB flash + 8MB OCTAL PSRAM (Rev B board) ---
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi   ; octal PSRAM

build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I include            ; so include/lv_conf.h is found
    ; Pin the ESP32-S3 to the HARDWARE USB-Serial/JTAG console (USB_MODE=1) rather
    ; than TinyUSB (mode 0). This port survives crashes/BLE init (TinyUSB drops off
    ; the bus mid-hang), so panics stay readable — and it matches the known-good
    ; sibling remote-temp-esp32s3 config that runs the same NimBLE 2.2.0.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; USB-CDC serial over native USB

lib_deps =
    lvgl/lvgl @ 9.5.0
    lovyan03/LovyanGFX @ 1.2.21
    adafruit/Adafruit HDC302x @ 1.0.3
    adafruit/Adafruit MAX1704X @ 1.0.3
    adafruit/Adafruit BusIO @ 1.17.4
    dawidchyrzynski/home-assistant-integration @ 2.1.0
    knolleary/PubSubClient @ 2.8   ; required by ArduinoHA (it ships its own serializer; no ArduinoJson)
    h2zero/NimBLE-Arduino @ 2.5.0  ; BLE BTHome v2 broadcast path. Must be 2.x on arduino-esp32 core 3.x / IDF 5.x — 1.4.x crashes at BLE init (TLSF heap assert). 2.5.0 is the exact version verified working in sibling remote-temp-esp32s3; 2.2.0 also TLSF-asserts in btdm_controller_init on this board.
